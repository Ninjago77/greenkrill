version: '3.8'

services:
  greenkrill:
    image: ninjago77/greenkrill:latest
    volumes:
      # NOTE: Relative paths (./) require the same folder structure 
      # to exist on every node in the Swarm.
      - ./life:/workspace/life
      - ./soul:/workspace/soul
      - ./play:/workspace/play
    environment:
      - PYTHONUNBUFFERED=1
    # 'stdin_open' and 'tty' are often ignored in Swarm; 
    # check if your bot requires them for interaction.
    stdin_open: true
    tty: true
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      # resources:
        # limits:
          # cpus: '0.50'
          # memory: 512M
